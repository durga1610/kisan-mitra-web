<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisan Mitra - Trends</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0F172A;
            --card-bg: #1E293B;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --success: #10B981;
            --error: #EF4444;
            --border-color: #334155;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 24px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        header {
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            margin: 0;
            font-size: 24px;
            color: var(--success);
        }
        
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 16px;
            font-weight: 600;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--text-main);
            background-color: var(--border-color);
        }
        
        .panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px 16px;
            text-align: center;
            font-size: 14px;
            border-bottom: 1px solid var(--border-color);
        }
        
        th {
            color: var(--text-muted);
            font-weight: 600;
        }
        
        .rate-high { color: var(--success); font-weight: 700; }
        .rate-low { color: var(--error); font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Kisan Mitra E2E Trends</h1>
            <div class="nav-links">
                <a href="execution-report.html">Grid View</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="trends.html" class="active">Trends</a>
            </div>
        </header>
        
        <div class="panel">
            <h2>Recent Build Trend</h2>
            <table>
                <thead>
                    <tr>
                        <th>Build Run</th>
                        <th>Execution Date</th>
                        <th>Total Tests</th>
                        <th>Passed</th>
                        <th>Failed</th>
                        <th>Pass Rate</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>#1</strong></td>
                        <td>2026-06-22 14:15</td>
                        <td>8</td>
                        <td>5</td>
                        <td>3</td>
                        <td><span class="rate-low">62.5%</span></td>
                    </tr>
                    <tr>
                        <td><strong>#2</strong></td>
                        <td>2026-06-22 16:45</td>
                        <td>8</td>
                        <td>5</td>
                        <td>3</td>
                        <td><span class="rate-low">62.5%</span></td>
                    </tr>
                    <tr>
                        <td><strong>#3</strong></td>
                        <td>2026-06-23 08:34</td>
                        <td>518</td>
                        <td>518</td>
                        <td>0</td>
                        <td><span class="rate-high">100.0%</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
