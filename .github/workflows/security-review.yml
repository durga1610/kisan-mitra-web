name: Security Review — Kisan Mitra Backend

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ============================================================
  # JOB 1: Auto-detect backend technology
  # ============================================================
  detect-backend:
    name: Detect Backend Technology
    runs-on: ubuntu-latest
    outputs:
      backend_type: ${{ steps.detect.outputs.backend_type }}
      has_python: ${{ steps.detect.outputs.has_python }}
      has_node: ${{ steps.detect.outputs.has_node }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect framework
        id: detect
        run: |
          TYPE="unknown"; HAS_PY="false"; HAS_NODE="false"
          if [ -f "backend/requirements.txt" ]; then
            HAS_PY="true"
            grep -qi "fastapi"  backend/requirements.txt && TYPE="fastapi"
            grep -qi "flask"    backend/requirements.txt && TYPE="flask"
            grep -qi "django"   backend/requirements.txt && TYPE="django"
          fi
          [ -f "package.json" ] && HAS_NODE="true" && TYPE="node"
          [ -f "pom.xml" ]      && TYPE="spring-boot"
          [ -f "go.mod" ]       && TYPE="go"
          echo "backend_type=$TYPE"  >> $GITHUB_OUTPUT
          echo "has_python=$HAS_PY"  >> $GITHUB_OUTPUT
          echo "has_node=$HAS_NODE"  >> $GITHUB_OUTPUT
          echo "### Backend Detection" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |"    >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|"    >> $GITHUB_STEP_SUMMARY
          echo "| Framework | $TYPE |"    >> $GITHUB_STEP_SUMMARY
          echo "| Python | $HAS_PY |"    >> $GITHUB_STEP_SUMMARY
          echo "| Node | $HAS_NODE |"    >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 2: SAST — Semgrep
  # ============================================================
  sast-semgrep:
    name: SAST — Semgrep Security Scan
    runs-on: ubuntu-latest
    needs: detect-backend
    if: needs.detect-backend.outputs.has_python == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/secrets
            p/fastapi
            p/jwt
            p/sql-injection
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  # ============================================================
  # JOB 3: SAST — Bandit (Python Security Linter)
  # ============================================================
  sast-bandit:
    name: SAST — Bandit Python Security
    runs-on: ubuntu-latest
    needs: detect-backend
    if: needs.detect-backend.outputs.has_python == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Bandit
        run: pip install bandit[toml] -q
      - name: Run Bandit
        run: |
          mkdir -p security-reports
          bandit -r backend/ \
            --severity-level medium \
            --confidence-level medium \
            -x backend/__pycache__ \
            -f json -o security-reports/bandit.json || true
          bandit -r backend/ \
            --severity-level medium \
            -x backend/__pycache__ \
            | tee security-reports/bandit.txt || true
          echo "### Bandit SAST Results" >> $GITHUB_STEP_SUMMARY
          echo '```'                     >> $GITHUB_STEP_SUMMARY
          tail -30 security-reports/bandit.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```'                     >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: security-reports/

  # ============================================================
  # JOB 4: Dependency Vulnerability Scan
  # ============================================================
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: detect-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: needs.detect-backend.outputs.has_python == 'true'
        with:
          python-version: '3.11'
      - name: Install audit tools
        if: needs.detect-backend.outputs.has_python == 'true'
        run: pip install pip-audit safety -q
      - name: Run pip-audit
        if: needs.detect-backend.outputs.has_python == 'true'
        run: |
          mkdir -p security-reports
          cd backend
          pip-audit -r requirements.txt \
            --format markdown \
            -o ../security-reports/pip-audit.md || true
          pip-audit -r requirements.txt \
            --format json \
            -o ../security-reports/pip-audit.json || true
          echo "### pip-audit Results" >> $GITHUB_STEP_SUMMARY
          cat ../security-reports/pip-audit.md >> $GITHUB_STEP_SUMMARY || true
      - name: Run safety check
        if: needs.detect-backend.outputs.has_python == 'true'
        run: |
          cd backend
          safety check -r requirements.txt --output markdown \
            2>&1 | tee ../security-reports/safety.md || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-scan
          path: security-reports/

  # ============================================================
  # JOB 5: Secret Scanning — Gitleaks
  # ============================================================
  secret-scan:
    name: Secret & Credential Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: results.sarif
        continue-on-error: true

  # ============================================================
  # JOB 6: Container / Filesystem Scan — Trivy
  # ============================================================
  trivy-scan:
    name: Trivy Container & Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
        continue-on-error: true
      - name: Trivy Docker scan (if Dockerfile exists)
        run: |
          if [ -f "backend/Dockerfile" ]; then
            cd backend
            docker build -t kisan-mitra-scan:latest . 2>/dev/null || echo "Docker build skipped"
          fi
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-fs.sarif
        continue-on-error: true

  # ============================================================
  # JOB 7: Custom API Security Checks
  # ============================================================
  api-security-check:
    name: API Security — Custom Rules
    runs-on: ubuntu-latest
    needs: detect-backend
    if: needs.detect-backend.outputs.has_python == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run custom API security checker
        id: api_check
        run: |
          python3 - <<'EOF'
          import os, re, json, sys

          issues, critical = [], []
          backend = "backend"

          def check_file(fname, checks):
              path = os.path.join(backend, fname)
              if not os.path.exists(path):
                  return
              content = open(path).read()
              for sev, rule, detail in checks:
                  if re.search(rule, content):
                      issues.append({"severity": sev, "file": fname, "detail": detail})
                      if sev == "CRITICAL":
                          critical.append(detail)

          # main.py checks
          check_file("main.py", [
              ("CRITICAL", r"allow_origins\s*=\s*\[.{0,5}[\"']\*[\"']",
               "Wildcard CORS: allow_origins=['*']"),
              ("CRITICAL", r"@app\.(get|post|put|delete|patch)\(",
               "Endpoints found with no authentication Depends() guard"),
              ("HIGH",     r"UploadFile",
               "File upload endpoint detected — check MIME/size validation"),
              ("HIGH",     r"docs_url\s*=\s*(?!None)",
               "Swagger docs may be enabled in production"),
              ("HIGH",     r"torch\.load\([^)]*\)(?!.*weights_only\s*=\s*True)",
               "torch.load() called without weights_only=True"),
          ])
          check_file("advisory_engine.py", [
              ("HIGH", r"pickle\.load", "Unsafe pickle.load() deserialization"),
          ])
          check_file("suitability_engine.py", [
              ("HIGH", r"pickle\.load", "Unsafe pickle.load() deserialization"),
          ])

          # Check for missing auth
          main = open(os.path.join(backend, "main.py")).read()
          if "HTTPBearer" not in main and "OAuth2" not in main and "verify_token" not in main:
              issues.insert(0, {"severity":"CRITICAL","file":"main.py",
                                "detail":"No authentication mechanism found (HTTPBearer/OAuth2/Depends)"})
              critical.insert(0, "No authentication found")

          # Check for rate limiting
          if "slowapi" not in main and "RateLimiter" not in main and "limiter" not in main:
              issues.append({"severity":"HIGH","file":"main.py",
                             "detail":"No rate limiting found (slowapi/limiter)"})

          # Check env files for secrets
          for env_file in [".env.local", ".env.production", ".env.test"]:
              if os.path.exists(env_file):
                  content = open(env_file).read()
                  if re.search(r"OIDC_TOKEN\s*=\s*\"ey", content):
                      issues.insert(0, {"severity":"CRITICAL","file":env_file,
                                        "detail":"Live OIDC JWT token found in env file"})
                      critical.insert(0, f"Live OIDC token in {env_file}")

          os.makedirs("security-reports", exist_ok=True)
          with open("security-reports/api-security.json","w") as f:
              json.dump({"issues":issues,"critical_count":len(critical),"total":len(issues)},f,indent=2)

          print(f"\n{'='*60}")
          print(f" API Security Check — {len(issues)} issues ({len(critical)} CRITICAL)")
          print(f"{'='*60}")
          for i in issues:
              icon = {"CRITICAL":"CRIT","HIGH":"HIGH","MEDIUM":"MED","LOW":"LOW"}.get(i["severity"],"?")
              print(f"[{icon}] {i['file']}: {i['detail']}")

          with open(os.environ.get("GITHUB_STEP_SUMMARY","/dev/null"),"a") as f:
              f.write("\n### API Security Check Results\n")
              f.write(f"**Total:** {len(issues)}  |  **Critical:** {len(critical)}\n\n")
              f.write("| Severity | File | Finding |\n|----------|------|---------|\n")
              for i in issues:
                  icon = {"CRITICAL":"🔴","HIGH":"🟠","MEDIUM":"🟡","LOW":"🟢"}.get(i["severity"],"⚪")
                  f.write(f"| {icon} {i['severity']} | {i['file']} | {i['detail']} |\n")

          if critical:
              print(f"\nFAILED: {len(critical)} CRITICAL issues found!")
              sys.exit(1)
          else:
              print("\nPASSED: No critical API security issues.")
          EOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-security-check
          path: security-reports/

  # ============================================================
  # JOB 8: Run Test Suite
  # ============================================================
  run-tests:
    name: Run Backend Test Suite
    runs-on: ubuntu-latest
    needs: detect-backend
    if: needs.detect-backend.outputs.has_python == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt -q
          pip install pytest httpx -q
      - name: Run pytest
        run: |
          cd backend
          python -m pytest test_api.py -v \
            --tb=short \
            --junitxml=../test-results.xml \
            2>&1 | tee ../test-output.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            test-output.txt

  # ============================================================
  # JOB 9: Generate Consolidated Report
  # ============================================================
  generate-report:
    name: Generate Consolidated Security Report
    runs-on: ubuntu-latest
    needs:
      - sast-semgrep
      - sast-bandit
      - dependency-scan
      - secret-scan
      - trivy-scan
      - api-security-check
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts/
        continue-on-error: true
      - name: Generate report
        run: |
          python3 - <<'EOF'
          import json, os, glob
          from datetime import datetime

          ts = datetime.now().strftime("%Y-%m-%d %H:%M UTC")
          sha = os.environ.get("GITHUB_SHA","unknown")[:8]
          branch = os.environ.get("GITHUB_REF_NAME","unknown")

          lines = [
            f"# Security Scan Report — Kisan Mitra",
            f"",
            f"**Generated:** {ts}  |  **Commit:** {sha}  |  **Branch:** {branch}",
            f"",
            f"## Scan Summary",
            f"",
            f"| Scanner | Status |",
            f"|---------|--------|",
          ]
          scanners = {
            "Semgrep SAST":          "all-artifacts/semgrep-sarif",
            "Bandit SAST":           "all-artifacts/bandit-report",
            "pip-audit":             "all-artifacts/dependency-scan",
            "Gitleaks":              "all-artifacts/gitleaks-report",
            "Trivy":                 "all-artifacts/trivy-report",
            "API Security Check":   "all-artifacts/api-security-check",
          }
          for name, path in scanners.items():
              status = "Completed" if os.path.exists(path) else "Skipped / Failed"
              lines.append(f"| {name} | {status} |")

          # Load API check results
          api_path = "all-artifacts/api-security-check/api-security.json"
          if os.path.exists(api_path):
              data = json.load(open(api_path))
              lines += [
                "",
                "## API Security Findings",
                "",
                f"**Total Issues:** {data.get('total',0)}  |  **Critical:** {data.get('critical_count',0)}",
                "",
                "| Severity | File | Finding |",
                "|----------|------|---------|",
              ]
              for i in data.get("issues",[]):
                  icon = {"CRITICAL":"🔴","HIGH":"🟠","MEDIUM":"🟡","LOW":"🟢"}.get(i["severity"],"⚪")
                  lines.append(f"| {icon} {i['severity']} | {i['file']} | {i['detail']} |")

          report = "\n".join(lines)
          with open("consolidated-report.md","w") as f:
              f.write(report)

          # Also write to GitHub Step Summary
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY","/dev/null")
          with open(summary_path,"a") as f:
              f.write(report)

          print("Report generated successfully.")
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: security-report-consolidated
          path: consolidated-report.md
          retention-days: 90

  # ============================================================
  # JOB 10: Security Gate — Fail on Critical
  # ============================================================
  security-gate:
    name: Security Gate (Fail on Critical)
    runs-on: ubuntu-latest
    needs:
      - api-security-check
      - secret-scan
      - run-tests
    if: always()
    steps:
      - name: Evaluate security gate
        run: |
          API="${{ needs.api-security-check.result }}"
          SEC="${{ needs.secret-scan.result }}"
          TST="${{ needs.run-tests.result }}"

          echo "API Security: $API"
          echo "Secret Scan:  $SEC"
          echo "Test Suite:   $TST"

          FAIL=false
          [ "$API" = "failure" ] && echo "BLOCKED: Critical API security issues found!" && FAIL=true
          [ "$SEC" = "failure" ] && echo "BLOCKED: Secrets/credentials found in repo!"  && FAIL=true
          [ "$TST" = "failure" ] && echo "WARNING: Test suite failures detected."

          {
            echo "### Security Gate"
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| API Security | $API |"
            echo "| Secret Scan | $SEC |"
            echo "| Test Suite | $TST |"
          } >> $GITHUB_STEP_SUMMARY

          if [ "$FAIL" = "true" ]; then
            echo "Security gate FAILED — fix critical issues before merging."
            exit 1
          fi
          echo "Security gate PASSED."
