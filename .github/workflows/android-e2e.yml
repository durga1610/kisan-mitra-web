# Android E2E workflow configuration
name: Android E2E & Report Hosting

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 2

  mobile-e2e-testing:
    name: Appium Mobile E2E Testing
    needs: build-apk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Appium-Python-Client pytest openpyxl

      - name: Setup Node (For Appium)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & UIAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Appium E2E Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          script: |
            # Start Appium in background and redirect streams to prevent step hang
            nohup appium --port 4723 > appium.log 2>&1 < /dev/null &
            # Wait for Appium to spin up
            sleep 10
            
            # Execute mobile test runner from repository root
            python tests/mobile_e2e/run_mobile_tests.py

      - name: Upload Test Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-e2e-test-results
          path: |
            tests/mobile_e2e/Test Results/
          retention-days: 14

  deploy-reports:
    name: Deploy Reports to GitHub Pages
    needs: mobile-e2e-testing
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo (main branch)
        uses: actions/checkout@v4

      - name: Checkout gh-pages Branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir
        continue-on-error: true

      - name: Download Test Reports
        uses: actions/download-artifact@v4
        with:
          name: appium-e2e-test-results
          path: temp_reports/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Consolidated Summary Generator
        run: |
          # Ensure directories exist in gh-pages-dir
          mkdir -p gh-pages-dir/reports/latest/android
          mkdir -p gh-pages-dir/reports/history/android/build-${{ github.run_number }}
          
          # Copy current test results to temp_reports to be read by summary generator
          mkdir -p tests/mobile_e2e/"Test Results"/JSON
          if [ -f "temp_reports/JSON/execution-results.json" ]; then
            cp "temp_reports/JSON/execution-results.json" tests/mobile_e2e/"Test Results"/JSON/
          fi
          
          # Run script to read/write gh-pages-dir/reports/latest/cicd-status.json
          python tests/generate_consolidated_summary.py --type android --run-number ${{ github.run_number }} --commit ${{ github.sha }} --pages-dir gh-pages-dir
          
          # Copy actual HTML/XLSX/Logs/Screenshots reports to latest and history dirs
          if [ -f "temp_reports/HTML/execution-report.html" ]; then
            cp -r temp_reports/HTML/* gh-pages-dir/reports/latest/android/
            cp -r temp_reports/HTML/* gh-pages-dir/reports/history/android/build-${{ github.run_number }}/
          fi
          if [ -d "temp_reports/Screenshots" ]; then
            cp -r temp_reports/Screenshots gh-pages-dir/reports/latest/android/
            cp -r temp_reports/Screenshots gh-pages-dir/reports/history/android/build-${{ github.run_number }}/
          fi
          if [ -d "temp_reports/Logs" ]; then
            cp -r temp_reports/Logs gh-pages-dir/reports/latest/android/
            cp -r temp_reports/Logs gh-pages-dir/reports/history/android/build-${{ github.run_number }}/
          fi
          if [ -f "temp_reports/Summary/summary.md" ]; then
            cp temp_reports/Summary/summary.md gh-pages-dir/reports/latest/android/
            cp temp_reports/Summary/summary.md gh-pages-dir/reports/history/android/build-${{ github.run_number }}/
          fi
          if [ -d "temp_reports/Excel" ]; then
            cp -r temp_reports/Excel gh-pages-dir/reports/latest/android/
            cp -r temp_reports/Excel gh-pages-dir/reports/history/android/build-${{ github.run_number }}/
          fi

      - name: Deploy to gh-pages Branch
        run: |
          cd gh-pages-dir
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # In case gh-pages wasn't checked out (orphan)
          if [ ! -d ".git" ]; then
            git init
            git checkout -b gh-pages
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            echo "<h1>Kisan Mitra Test Reports Hosting</h1>" > index.html
            git add index.html
            git commit -m "Initialize gh-pages"
          fi
          
          git add reports/
          git diff --quiet && git diff --staged --quiet || git commit -m "docs(reports): deploy Android E2E reports for build ${{ github.run_number }}"
          git push origin gh-pages
