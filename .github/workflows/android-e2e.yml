name: Android E2E & Report Hosting

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 2

  mobile-e2e-testing:
    name: Appium Mobile E2E Testing
    needs: build-apk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Appium-Python-Client pytest openpyxl

      - name: Setup Node (For Appium)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & UIAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Appium E2E Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          script: |
            # Start Appium in background and redirect streams to prevent step hang
            nohup appium --port 4723 > appium.log 2>&1 < /dev/null &
            # Wait for Appium to spin up
            sleep 10
            
            # Execute mobile test runner
            cd tests/mobile_e2e
            python run_mobile_tests.py

      - name: Upload Test Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-e2e-test-results
          path: |
            tests/mobile_e2e/Test Results/
          retention-days: 14

  deploy-reports:
    name: Deploy Reports to GitHub Pages
    needs: mobile-e2e-testing
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download Test Reports
        uses: actions/download-artifact@v4
        with:
          name: appium-e2e-test-results
          path: temp_reports/

      - name: Deploy to gh-pages Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Initialize or clone gh-pages branch
          git fetch origin
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
            # Put dummy index.html at root if empty
            echo "<h1>Kisan Mitra Test Reports Hosting</h1>" > index.html
            git add index.html
            git commit -m "Initialize gh-pages"
          fi
          
          # Setup directories
          mkdir -p reports/latest
          mkdir -p reports/history/build-${{ github.run_number }}
          
          # Copy reports
          cp -r temp_reports/HTML/execution-report.html reports/latest/
          cp -r temp_reports/Summary/summary.md reports/latest/
          if [ -d "temp_reports/Screenshots" ]; then
            cp -r temp_reports/Screenshots reports/latest/
          fi
          if [ -d "temp_reports/Logs" ]; then
            cp -r temp_reports/Logs reports/latest/
          fi
          
          # Copy to history folder
          cp -r reports/latest/* reports/history/build-${{ github.run_number }}/
          
          # Add and commit
          git add reports/
          git commit -m "docs(reports): deploy Appium E2E report for build ${{ github.run_number }}"
          git push origin gh-pages

      - name: Generate Actions Step Summary
        if: always()
        run: |
          # Read summary from temp_reports if exists
          if [ -f "temp_reports/Summary/summary.md" ]; then
            cat "temp_reports/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Android Appium Test Summary" >> $GITHUB_STEP_SUMMARY
            echo "Test suite failed or reports were not compiled." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Live Hosted Reports" >> $GITHUB_STEP_SUMMARY
          echo "- **Live Report URL**: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/latest/execution-report.html" >> $GITHUB_STEP_SUMMARY
          echo "- **History Report URL**: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/history/build-${{ github.run_number }}/execution-report.html" >> $GITHUB_STEP_SUMMARY
