name: "📱 Consolidated CI/CD Pipeline & Unified Summary"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ============================================================
  # JOB 1: Security Review
  # ============================================================
  security-scan:
    name: "🔒 Security Review"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "🔐 Run Semgrep SAST scan"
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/secrets
            p/fastapi
            p/jwt
            p/sql-injection
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: "📤 Upload Semgrep SARIF"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

      - name: "⚙️ Install Bandit & Audit Tools"
        run: pip install bandit[toml] pip-audit safety -q

      - name: "🔍 Run Bandit SAST scan"
        run: |
          mkdir -p security-reports
          bandit -r backend/ --severity-level medium --confidence-level medium -x backend/__pycache__ -f json -o security-reports/bandit.json || true
          bandit -r backend/ --severity-level medium -x backend/__pycache__ | tee security-reports/bandit.txt || true

      - name: "🔍 Run pip-audit"
        run: |
          cd backend
          pip-audit -r requirements.txt --format markdown -o ../security-reports/pip-audit.md || true
          pip-audit -r requirements.txt --format json -o ../security-reports/pip-audit.json || true

      - name: "🔍 Run safety check"
        run: |
          cd backend
          safety check -r requirements.txt --output markdown 2>&1 | tee ../security-reports/safety.md || true

      - name: "🔑 Run Gitleaks"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_SUMMARY: "false"
        continue-on-error: true

      - name: "🛡️  Run Trivy filesystem scan"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
        continue-on-error: true

      - name: "📤 Upload Trivy SARIF"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
        continue-on-error: true

      - name: "🔍 Run Custom API Security Check"
        run: |
          python3 - <<'EOF'
          import os, re, json, sys
          issues, critical = [], []
          backend = "backend"
          def check_file(fname, checks):
              path = os.path.join(backend, fname)
              if not os.path.exists(path): return
              content = open(path).read()
              for sev, rule, detail in checks:
                  if re.search(rule, content):
                      issues.append({"severity": sev, "file": fname, "detail": detail})
                      if sev == "CRITICAL": critical.append(detail)
          check_file("main.py", [
              ("CRITICAL", r"allow_origins\s*=\s*\[.{0,5}[\"']\*[\"']", "Wildcard CORS: allow_origins=['*']"),
              ("CRITICAL", r"@app\.(get|post|put|delete|patch)\(", "Endpoints found with no authentication Depends() guard"),
              ("HIGH",     r"UploadFile", "File upload endpoint detected — check MIME/size validation"),
              ("HIGH",     r"docs_url\s*=\s*(?!None)", "Swagger docs may be enabled in production"),
              ("HIGH",     r"torch\.load\((?![^)]*weights_only\s*=\s*True)[^)]*\)", "torch.load() called without weights_only=True"),
          ])
          check_file("advisory_engine.py", [
              ("HIGH", r"pickle\.load", "Unsafe pickle.load() deserialization"),
          ])
          check_file("suitability_engine.py", [
              ("HIGH", r"pickle\.load", "Unsafe pickle.load() deserialization"),
          ])
          main = open(os.path.join(backend, "main.py")).read()
          if "HTTPBearer" not in main and "OAuth2" not in main and "verify_token" not in main:
              issues.insert(0, {"severity":"CRITICAL","file":"main.py","detail":"No authentication mechanism found"})
              critical.insert(0, "No authentication found")
          if "slowapi" not in main and "RateLimiter" not in main and "limiter" not in main:
              issues.append({"severity":"HIGH","file":"main.py","detail":"No rate limiting found"})
          os.makedirs("security-reports", exist_ok=True)
          with open("security-reports/api-security.json","w") as f:
              json.dump({"issues":issues,"critical_count":len(critical),"total":len(issues)},f,indent=2)
          EOF

      - name: "📊 Generate Consolidated Security Review markdown"
        run: |
          python3 - <<'EOF'
          import json, os
          from datetime import datetime
          ts = datetime.now().strftime("%Y-%m-%d %H:%M UTC")
          sha = os.environ.get("GITHUB_SHA","unknown")[:8]
          branch = os.environ.get("GITHUB_REF_NAME","unknown")
          lines = [
            f"# Security Scan Report — Kisan Mitra",
            f"",
            f"**Generated:** {ts}  |  **Commit:** {sha}  |  **Branch:** {branch}",
            f"",
            f"## Scan Summary",
            f"",
            f"| Scanner | Status |",
            f"|---------|--------|",
          ]
          scanners = {
            "Semgrep SAST":          "semgrep.sarif",
            "Bandit SAST":           "security-reports/bandit.json",
            "pip-audit":             "security-reports/pip-audit.json",
            "Gitleaks":              "results.sarif",
            "Trivy":                 "trivy-fs.sarif",
            "API Security Check":   "security-reports/api-security.json",
          }
          for name, path in scanners.items():
              status = "Completed" if os.path.exists(path) else "Skipped / Failed"
              lines.append(f"| {name} | {status} |")
          api_path = "security-reports/api-security.json"
          if os.path.exists(api_path):
              data = json.load(open(api_path))
              lines += [
                "",
                "## API Security Findings",
                "",
                f"**Total Issues:** {data.get('total',0)}  |  **Critical:** {data.get('critical_count',0)}",
                "",
                "| Severity | File | Finding |",
                "|----------|------|---------|",
              ]
              for i in data.get("issues",[]):
                  icon = {"CRITICAL":"🔴","HIGH":"🟠","MEDIUM":"🟡","LOW":"🟢"}.get(i["severity"],"⚪")
                  lines.append(f"| {icon} {i['severity']} | {i['file']} | {i['detail']} |")
          with open("security-reports/consolidated-report.md","w") as f:
              f.write("\n".join(lines))
          EOF

      - name: "📤 Upload Security Reports Artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            security-reports/
            semgrep.sarif
            trivy-fs.sarif
            results.sarif

  # ============================================================
  # JOB 2: Build & Deploy Web App
  # ============================================================
  build-web:
    name: "🔨 Build & Deploy Web App"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "☕ Setup Java 17"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: "💙 Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: "📦 Install Flutter dependencies"
        run: flutter pub get

      - name: "🏗️  Build Web Client"
        run: flutter build web --base-href "/kisan-mitra-web/"

      - name: "🚀 Deploy Web to GitHub Pages"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p ../temp_web_build
          cp -r build/web/* ../temp_web_build/
          git reset --hard
          git clean -fd
          git fetch origin
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
            echo "<h1>Kisan Mitra Web Client</h1>" > index.html
            git add index.html
            git commit -m "Initialize gh-pages"
          fi
          find . -maxdepth 1 -not -name '.' -not -name '..' -not -name '.git' -not -name 'reports' -exec rm -rf {} +
          cp -r ../temp_web_build/* .
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "docs(web): deploy web client for commit ${{ github.sha }}"
          git push origin gh-pages

  # ============================================================
  # JOB 3: Verify Live Web Deployment
  # ============================================================
  verify-web:
    name: "🔍 Verify Live Web Deployment"
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: "⏳ Wait 90 s for Pages deploy start"
        run: sleep 90

      - name: "✅ Verify HTTP 200 from live URL"
        run: |
          URL="https://durga1610.github.io/kisan-mitra-web/"
          echo "Verifying availability of $URL"
          for i in {1..30}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL || true)
            if [ "$STATUS" = "200" ]; then
              echo "Deployment is online! HTTP 200."
              exit 0
            fi
            echo "Status was $STATUS, waiting 10 seconds (attempt $i/30)..."
            sleep 10
          done
          echo "Deployment timed out or failed to return HTTP 200."
          exit 1

  # ============================================================
  # JOB 4: Web E2E Tests
  # ============================================================
  web-e2e:
    name: "🧪 Web E2E Tests"
    needs: verify-web
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "📦 Install Python dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install selenium pytest openpyxl httpx numpy uvicorn pillow pydantic python-multipart torch torchvision faiss-cpu sentence-transformers transformers accelerate scikit-learn pandas slowapi firebase-admin google-generativeai python-dotenv

      - name: "🧪 Run Selenium E2E tests"
        env:
          BASE_URL: "https://durga1610.github.io/kisan-mitra-web/"
          APP_ENV: testing
        run: |
          cd tests/e2e
          python run_tests.py

      - name: "⚙️ Start Backend Server in Background for Load Test"
        env:
          TESTING: "1"
        run: |
          cd backend
          python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 8 # wait for backend startup

      - name: "📈 Run Load Testing"
        env:
          LOAD_TEST_URL: "http://127.0.0.1:8000/"
          LOAD_TEST_CONCURRENCY: "100"
          LOAD_TEST_DURATION: "60"
        run: |
          python tests/perf_load_test.py

      - name: "📤 Upload web test reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-e2e-reports
          path: |
            tests/e2e/Test Results/
          retention-days: 14

      - name: "📤 Upload load test reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-reports
          path: |
            Vulnerability Test Results/load-test-report.md
          retention-days: 14

  # ============================================================
  # JOB 5: Build Android APK
  # ============================================================
  build-apk:
    name: "🔨 Build Android APK"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "☕ Setup Java 17"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: "💙 Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: "📦 Install Flutter dependencies"
        run: flutter pub get

      - name: "🏗️  Build debug APK"
        run: flutter build apk --debug

      - name: "⬆️  Upload APK artifact"
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 2

  # ============================================================
  # JOB 6: Android Appium E2E
  # ============================================================
  android-e2e:
    name: "🧪 Android Appium E2E"
    needs: build-apk
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "⬇️  Download APK artifact"
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "📦 Install Python dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install Appium-Python-Client pytest openpyxl

      - name: "📦 Setup Node.js (For Appium)"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "🚀 Install Appium & UIAutomator2 Driver"
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: "⚡ Enable KVM group permissions"
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: "▶️  Start emulator & run E2E tests"
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          script: |
            nohup appium --port 4723 > appium.log 2>&1 < /dev/null &
            sleep 10
            python tests/mobile_e2e/run_mobile_tests.py

      - name: "📤 Upload android test reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-reports
          path: |
            tests/mobile_e2e/Test Results/
          retention-days: 14

  # ============================================================
  # JOB 7: Backend Service Tests
  # ============================================================
  backend-tests:
    name: "⚙️ Backend Service Tests"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "📦 Install backend dependencies"
        run: |
          cd backend
          pip install -r requirements.txt -q
          pip install pytest httpx -q

      - name: "⚙️ Run Backend service tests (pytest)"
        run: |
          cd backend
          python -m pytest test_api.py -v --tb=short --junitxml=../test-results.xml 2>&1 | tee ../test-output.txt || true

      - name: "📤 Upload backend test reports"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-reports
          path: |
            test-results.xml
            test-output.txt

  # ============================================================
  # JOB 8: Unified Summary & Report Deployment
  # ============================================================
  unified-summary:
    name: "📊 Unified Summary & Report Deployment"
    needs:
      - security-scan
      - web-e2e
      - android-e2e
      - backend-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📖 Checkout gh-pages Branch"
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir
        continue-on-error: true

      - name: "📥 Download security reports"
        uses: actions/download-artifact@v4
        with:
          name: security-reports
          path: security-reports/
        continue-on-error: true

      - name: "📥 Download backend test reports"
        uses: actions/download-artifact@v4
        with:
          name: backend-test-reports
          path: backend-reports/
        continue-on-error: true

      - name: "📥 Download android E2E reports"
        uses: actions/download-artifact@v4
        with:
          name: android-e2e-reports
          path: android-reports/
        continue-on-error: true

      - name: "📥 Download web E2E reports"
        uses: actions/download-artifact@v4
        with:
          name: selenium-e2e-reports
          path: web-reports/
        continue-on-error: true

      - name: "📥 Download load test reports"
        uses: actions/download-artifact@v4
        with:
          name: load-test-reports
          path: load-test-reports/
        continue-on-error: true

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "📦 Install openpyxl dependency"
        run: pip install openpyxl

      - name: "📋 Publish Combined Step Summary Dashboard"
        run: |
          mkdir -p gh-pages-dir/reports/latest/web
          mkdir -p gh-pages-dir/reports/latest/android
          
          # Move Web E2E results to expected structure for generator
          mkdir -p tests/e2e/"Test Results"/JSON
          if [ -f "web-reports/JSON/execution-results.json" ]; then
            cp "web-reports/JSON/execution-results.json" tests/e2e/"Test Results"/JSON/
          fi
          
          # Move Android E2E results to expected structure for generator
          mkdir -p tests/mobile_e2e/"Test Results"/JSON
          if [ -f "android-reports/JSON/execution-results.json" ]; then
            cp "android-reports/JSON/execution-results.json" tests/mobile_e2e/"Test Results"/JSON/
          fi
          
          # Reconstruct security artifacts directory structures for parser
          mkdir -p security-reports/semgrep-sarif
          if [ -f "security-reports/semgrep.sarif" ]; then
            cp security-reports/semgrep.sarif security-reports/semgrep-sarif/
          fi
          mkdir -p security-reports/bandit-report
          if [ -f "security-reports/security-reports/bandit.json" ]; then
            cp security-reports/security-reports/bandit.json security-reports/bandit-report/
          fi
          mkdir -p security-reports/dependency-scan
          if [ -f "security-reports/security-reports/pip-audit.json" ]; then
            cp security-reports/security-reports/pip-audit.json security-reports/dependency-scan/
          fi
          mkdir -p security-reports/trivy-report
          if [ -f "security-reports/trivy-fs.sarif" ]; then
            cp security-reports/trivy-fs.sarif security-reports/trivy-report/
          fi
          mkdir -p security-reports/api-security-check
          if [ -f "security-reports/security-reports/api-security.json" ]; then
            cp security-reports/security-reports/api-security.json security-reports/api-security-check/
          fi
          mkdir -p security-reports/gitleaks-report
          if [ -f "security-reports/results.sarif" ]; then
            cp security-reports/results.sarif security-reports/gitleaks-report/
          fi
          mkdir -p security-reports/test-results
          if [ -f "backend-reports/test-results.xml" ]; then
            cp backend-reports/test-results.xml security-reports/test-results/
          fi
          
          # Run consolidated generator for security
          python tests/generate_consolidated_summary.py --type security --run-number ${{ github.run_number }} --commit ${{ github.sha }} --pages-dir gh-pages-dir
          
          # Run consolidated generator for web
          python tests/generate_consolidated_summary.py --type web --run-number ${{ github.run_number }} --commit ${{ github.sha }} --pages-dir gh-pages-dir
          
          # Run consolidated generator for android
          python tests/generate_consolidated_summary.py --type android --run-number ${{ github.run_number }} --commit ${{ github.sha }} --pages-dir gh-pages-dir --publish-summary
          
          # Copy reports and test directories
          # Copy security report
          if [ -f "security-reports/security-reports/consolidated-report.md" ]; then
            cp security-reports/security-reports/consolidated-report.md gh-pages-dir/reports/latest/security-review.md
            mkdir -p gh-pages-dir/reports/history/security/build-${{ github.run_number }}
            cp security-reports/security-reports/consolidated-report.md gh-pages-dir/reports/history/security/build-${{ github.run_number }}/security-review.md
          fi
          
          # Copy Web E2E files
          if [ -f "web-reports/HTML/execution-report.html" ]; then
            cp -r web-reports/HTML/* gh-pages-dir/reports/latest/web/
            mkdir -p gh-pages-dir/reports/history/web/build-${{ github.run_number }}
            cp -r web-reports/HTML/* gh-pages-dir/reports/history/web/build-${{ github.run_number }}/
          fi
          if [ -d "web-reports/Screenshots" ]; then
            cp -r web-reports/Screenshots gh-pages-dir/reports/latest/web/
            cp -r web-reports/Screenshots gh-pages-dir/reports/history/web/build-${{ github.run_number }}/
          fi
          if [ -d "web-reports/Logs" ]; then
            cp -r web-reports/Logs gh-pages-dir/reports/latest/web/
            cp -r web-reports/Logs gh-pages-dir/reports/history/web/build-${{ github.run_number }}/
          fi
          if [ -f "web-reports/Summary/summary.md" ]; then
            cp web-reports/Summary/summary.md gh-pages-dir/reports/latest/web/
            cp web-reports/Summary/summary.md gh-pages-dir/reports/history/web/build-${{ github.run_number }}/
          fi
          if [ -d "web-reports/Excel" ]; then
            cp -r web-reports/Excel gh-pages-dir/reports/latest/web/
            cp -r web-reports/Excel gh-pages-dir/reports/history/web/build-${{ github.run_number }}/
          fi
          
          # Copy Android Appium E2E files
          if [ -f "android-reports/HTML/execution-report.html" ]; then
            cp -r android-reports/HTML/* gh-pages-dir/reports/latest/android/
            mkdir -p gh-pages-dir/reports/history/android/build-${{ github.run_number }}
            cp -r android-reports/HTML/* gh-pages-dir/reports/history/android/build-${{ github.run_number }}/
          fi
          if [ -d "android-reports/Screenshots" ]; then
            cp -r android-reports/Screenshots gh-pages-dir/reports/latest/android/
            cp -r android-reports/Screenshots gh-pages-dir/reports/history/android/build-${{ github.run_number }}/
          fi
          if [ -d "android-reports/Logs" ]; then
            cp -r android-reports/Logs gh-pages-dir/reports/latest/android/
            cp -r android-reports/Logs gh-pages-dir/reports/history/android/build-${{ github.run_number }}/
          fi
          if [ -f "android-reports/Summary/summary.md" ]; then
            cp android-reports/Summary/summary.md gh-pages-dir/reports/latest/android/
            cp android-reports/Summary/summary.md gh-pages-dir/reports/history/android/build-${{ github.run_number }}/
          fi
          if [ -d "android-reports/Excel" ]; then
            cp -r android-reports/Excel gh-pages-dir/reports/latest/android/
            cp -r android-reports/Excel gh-pages-dir/reports/history/android/build-${{ github.run_number }}/
          fi

          # Copy Load Test Report
          if [ -f "load-test-reports/load-test-report.md" ]; then
            cp load-test-reports/load-test-report.md gh-pages-dir/reports/latest/load-test-report.md
            mkdir -p gh-pages-dir/reports/history/load/build-${{ github.run_number }}
            cp load-test-reports/load-test-report.md gh-pages-dir/reports/history/load/build-${{ github.run_number }}/load-test-report.md
          fi

      - name: "🚀 Deploy All Consolidated Reports to gh-pages"
        run: |
          cd gh-pages-dir
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -d ".git" ]; then
            git init
            git checkout -b gh-pages
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            echo "<h1>Kisan Mitra CI/CD Consolidated Reports</h1>" > index.html
            git add index.html
            git commit -m "Initialize gh-pages"
          fi
          git add reports/
          git diff --quiet && git diff --staged --quiet || git commit -m "docs(reports): deploy unified consolidated summary reports for build ${{ github.run_number }}"
          git push origin gh-pages

      - name: "📤 Upload unified summary reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unified-summary-reports
          path: unified-reports/
          retention-days: 7
