name: Build, Deploy & E2E Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy Web Client
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Web Client
        run: flutter build web --base-href "/kisan-mitra-web/"

      - name: Deploy to gh-pages Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Copy compiled web build to a temporary folder
          mkdir -p ../temp_web_build
          cp -r build/web/* ../temp_web_build/
          
          # Clean working directory to prevent checkout conflict (e.g. from pubspec.lock modifications)
          git reset --hard
          git clean -fd
          
          # Initialize or checkout gh-pages
          git fetch origin
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
            echo "<h1>Kisan Mitra Web Client</h1>" > index.html
            git add index.html
            git commit -m "Initialize gh-pages"
          fi
          
          # Remove existing files at root, but preserve reports/ directory
          find . -maxdepth 1 -not -name '.' -not -name '..' -not -name '.git' -not -name 'reports' -exec rm -rf {} +
          
          # Copy new web build files from temp folder
          cp -r ../temp_web_build/* .
          
          # Commit and push
          git add .
          git commit -m "docs(web): deploy web client for commit ${{ github.sha }}"
          git push origin gh-pages

  e2e-testing:
    name: Selenium E2E Live Testing
    needs: build-and-deploy
    if: always() && (github.event_name == 'pull_request' || needs.build-and-deploy.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Determine Target URL
        id: get_url
        run: |
          echo "URL=https://durga1610.github.io/kisan-mitra-web/" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pytest openpyxl

      - name: Wait for Deployment Availability
        run: |
          echo "Checking availability of $URL"
          for i in {1..30}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL || true)
            if [ "$STATUS" = "200" ]; then
              echo "Deployment is online! HTTP 200."
              exit 0
            fi
            echo "Status was $STATUS, waiting 10 seconds (attempt $i/30)..."
            sleep 10
          done
          echo "Deployment timed out or failed to return HTTP 200."
          exit 1

      - name: Run Selenium Tests
        env:
          BASE_URL: ${{ env.URL }}
          APP_ENV: testing
        run: |
          cd tests/e2e
          python run_tests.py

      - name: Upload Test Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-e2e-test-results
          path: |
            tests/e2e/Test Results/
          retention-days: 30

      - name: Generate Actions Step Summary
        if: always()
        run: |
          if [ -f "tests/e2e/Test Results/Summary/summary.md" ]; then
            cat "tests/e2e/Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Live GitHub Pages E2E Test Summary" >> $GITHUB_STEP_SUMMARY
            echo "No summary.md file was found." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Live Hosted Reports" >> $GITHUB_STEP_SUMMARY
          echo "- **Live Report URL**: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/latest/execution-report.html" >> $GITHUB_STEP_SUMMARY
          echo "- **History Report URL**: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/history/build-${{ github.run_number }}/execution-report.html" >> $GITHUB_STEP_SUMMARY

  deploy-reports:
    name: Deploy E2E Reports to GitHub Pages
    needs: e2e-testing
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download Test Reports
        uses: actions/download-artifact@v4
        with:
          name: selenium-e2e-test-results
          path: temp_reports/

      - name: Deploy Reports to gh-pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
            echo "<h1>Kisan Mitra E2E Web Client</h1>" > index.html
            git add index.html
            git commit -m "Initialize gh-pages"
          fi
          
          # Setup directories
          mkdir -p reports/latest
          mkdir -p reports/history/build-${{ github.run_number }}
          
          # Copy reports
          cp -r temp_reports/HTML/execution-report.html reports/latest/
          cp -r temp_reports/HTML/dashboard.html reports/latest/
          cp -r temp_reports/Summary/summary.md reports/latest/
          if [ -d "temp_reports/Screenshots" ]; then
            cp -r temp_reports/Screenshots reports/latest/
          fi
          if [ -d "temp_reports/Logs" ]; then
            cp -r temp_reports/Logs reports/latest/
          fi
          
          # Copy to history folder
          cp -r reports/latest/* reports/history/build-${{ github.run_number }}/
          
          # Add and commit
          git add reports/
          git commit -m "docs(reports): deploy Selenium E2E report for build ${{ github.run_number }}"
          git push origin gh-pages
