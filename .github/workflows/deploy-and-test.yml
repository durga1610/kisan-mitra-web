name: Build, Deploy & E2E Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy Web Client
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Web Client (HTML Renderer)
        run: flutter build web --web-renderer html --base-href "/kisan-mitra-web/"

      - name: Setup Pages Config
        uses: actions/configure-pages@v5

      - name: Upload Build Artifacts to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build/web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  e2e-testing:
    name: Selenium E2E Live Testing
    needs: build-and-deploy
    if: always() && (github.event_name == 'pull_request' || needs.build-and-deploy.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Determine Target URL
        id: get_url
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "URL=https://durga1610.github.io/kisan-mitra-web/" >> $GITHUB_ENV
          else
            echo "URL=${{ needs.build-and-deploy.outputs.page_url }}" >> $GITHUB_ENV
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pytest openpyxl

      - name: Wait for Deployment Availability
        run: |
          echo "Checking availability of $URL"
          for i in {1..30}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL || true)
            if [ "$STATUS" = "200" ]; then
              echo "Deployment is online! HTTP 200."
              exit 0
            fi
            echo "Status was $STATUS, waiting 10 seconds (attempt $i/30)..."
            sleep 10
          done
          echo "Deployment timed out or failed to return HTTP 200."
          exit 1

      - name: Run Selenium Tests
        env:
          BASE_URL: ${{ env.URL }}
          APP_ENV: testing
        run: |
          cd tests/e2e
          python run_tests.py

      - name: Upload Test Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-e2e-test-results
          path: |
            tests/e2e/Test Results/
          retention-days: 14

      - name: Generate Actions Step Summary
        if: always()
        run: |
          if [ -f "tests/e2e/Test Results/Summary/summary.md" ]; then
            cat "tests/e2e/Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Live GitHub Pages E2E Test Summary" >> $GITHUB_STEP_SUMMARY
            echo "No summary.md file was found." >> $GITHUB_STEP_SUMMARY
          fi
