name: kisan_mitra
description: "Kisan Mitra - Your Smart Agriculture Companion"
publish_to: 'none'

version: 1.0.0-rc.1+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.2.7
  shared_preferences: ^2.5.5
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  image_picker: ^1.2.2
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.0.1
  google_sign_in: ^6.2.1
  provider: ^6.1.2
  geolocator: ^14.0.2
  google_generative_ai: ^0.4.7
  geocoding: ^4.0.0
  http: ^1.6.0
  fl_chart: ^1.2.0
  pdf: ^3.12.0
  printing: ^5.14.3
  font_awesome_flutter: ^11.0.0
  path_provider: ^2.1.5
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^21.0.0
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  flutter_markdown: ^0.7.7+1
  camera: ^0.12.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#2E7D32"
  image: "assets/icons/app_icon.png"
  android_12:
    image: "assets/icons/app_icon.png"
    icon_background_color: "#2E7D32"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
